name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          
      - name: Fix NonNull Imports
        run: |
          # Migrate hidden Android annotation to public AndroidX annotation
          find app/src/main/java -name "*.java" -exec sed -i 's/import android.annotation.NonNull;/import androidx.annotation.NonNull;/g' {} +
          
      - name: Inject Hidden APIs
        run: |
          # Pre-install the Android SDK platforms
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "platforms;android-34" "platforms;android-35"
          
          # Overwrite default android.jar with Hidden API variants required by Shizuku apps
          wget -qO "$ANDROID_HOME/platforms/android-33/android.jar" "https://github.com/anggrayudi/android-hidden-api/releases/download/33.0/android.jar" || true
          wget -qO "$ANDROID_HOME/platforms/android-34/android.jar" "https://github.com/anggrayudi/android-hidden-api/releases/download/34.0/android.jar" || true
          wget -qO "$ANDROID_HOME/platforms/android-35/android.jar" "https://github.com/anggrayudi/android-hidden-api/releases/download/35.0/android.jar" || true
          
      - name: Build with Gradle
        run: gradle assembleRelease --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelIMS-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
