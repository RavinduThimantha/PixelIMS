name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Install Gradle via the official action — avoids manual PATH juggling
    # and ensures the wrapper jar is available to generate gradlew if missing.
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9'

    # Generate gradlew + wrapper jar in case they are not committed to the repo
    - name: Ensure Gradle wrapper exists
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.9
        fi
        chmod +x gradlew

    # Cache key includes libs.versions.toml so version catalog changes bust the cache
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Generate a debug keystore — CI runners have no pre-existing one
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkeypair -v \
          -keystore ~/.android/debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    # --- INJECTED FIXES FOR THE 22 COMPILATION ERRORS ---

    - name: Fix NonNull Imports
      run: |
        # Replaces the hidden/removed Android annotation with the public AndroidX one
        find app/src/main/java -name "*.java" -exec sed -i 's/import android.annotation.NonNull;/import androidx.annotation.NonNull;/g' {} +

    - name: Inject Stub APIs into Android SDK
      run: |
        # 1. Compile the project's stub module first to generate the hidden classes
        ./gradlew :stub:assembleRelease --no-daemon

        # 2. Extract the compiled classes.jar from the stub's AAR output
        mkdir -p stub_temp/classes
        unzip -q stub/build/outputs/aar/stub-release.aar classes.jar -d stub_temp
        unzip -q stub_temp/classes.jar -d stub_temp/classes

        # 3. Inject these hidden classes directly into the system's android.jar
        cd stub_temp/classes
        zip -ur "$ANDROID_HOME/platforms/android-35/android.jar" .
        
    # ----------------------------------------------------

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PixelIMS-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
