name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9' # Installs the exact version your repo expects
          
      - name: Build with Gradle
        # Notice we use 'gradle' here instead of './gradlew'
        run: gradle assembleRelease --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelIMS-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
