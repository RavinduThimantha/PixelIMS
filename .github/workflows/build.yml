name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Ensure Gradle wrapper exists
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.9
        fi
        chmod +x gradlew

    # 1. Clean the project and remove annotations that don't exist
    - name: Cleanup Source Code
      run: |
        find app/src/main/java -name "*.java" -exec sed -i '/import android.annotation.NonNull;/d' {} +
        find app/src/main/java -name "*.java" -exec sed -i 's/@NonNull//g' {} +

    # 2. Force download required framework stubs before build
    - name: Inject Hidden API Stubs
      run: |
        mkdir -p app/libs
        wget -qO app/libs/hidden-api.jar https://repo1.maven.org/maven2/org/robolectric/android-all/14-robolectric-10818077/android-all-14-robolectric-10818077.jar

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PixelIMS-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
